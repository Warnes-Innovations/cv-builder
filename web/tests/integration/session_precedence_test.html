<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Session precedence integration test</title>
  <style>body{font-family:system-ui,Arial;background:#fff;padding:20px}#out{white-space:pre-wrap;font-family:monospace;background:#f8fafc;padding:12px;border-radius:6px;border:1px solid #e6edf3}</style>
</head>
<body>
  <h2>Session precedence integration test</h2>
  <p>This test loads the app scripts locally, mocks <code>/api/status</code> and <code>/api/master-fields</code> and asserts that session edits/decisions take precedence.</p>
  <div id="out">Starting...</div>
  <!-- Required by buildSummaryFocusSection; hidden during test -->
  <div id="summary-focus-container" style="display:none"></div>

  <script>
    // Minimal logger
    function log(msg){ const o = document.getElementById('out'); o.textContent += '\n' + msg; console.log(msg); }

    // Simple fetch mock for the test scope
    const MASTER_FIELDS = {
      ok: true,
      professional_summaries: { default: 'Master default', ai_recommended: 'Master AI' }
    };

    const STATUS = {
      phase: 'customization',
      achievement_edits: { '0': ['Edited bullet A','Edited bullet B'] },
      experience_decisions: { 'exp1': 'include' },
      skill_decisions: { 'Python': 'keep' },
      achievement_decisions: {},
      publication_decisions: {},
      summary_focus_override: 'ai_recommended',
      extra_skills: ['Go'],
      professional_summaries: { ai_recommended: 'Session AI', ai_generated: 'Session AI' }
    };

    const realFetch = window.fetch;
    window.fetch = async function(url, opts){
      // Strip query params before path matching so ?owner_token=... doesn't prevent mock hits
      const urlPath = typeof url === 'string' ? url.split('?')[0] : '';
      if (urlPath.endsWith('/api/status')){
        return new Response(JSON.stringify(STATUS), { status:200, headers:{'Content-Type':'application/json'} });
      }
      if (urlPath.endsWith('/api/master-fields')){
        return new Response(JSON.stringify(MASTER_FIELDS), { status:200, headers:{'Content-Type':'application/json'} });
      }
      // Swallow other API calls silently so no network errors escape to the test harness
      if (urlPath.includes('/api/')){
        return new Response('{}', { status:200, headers:{'Content-Type':'application/json'} });
      }
      return realFetch.apply(this, arguments);
    };

    // Load bundle.js first so module functions are on globalThis, then app.js.
    // Both are loaded dynamically so the DOMContentLoaded listener inside
    // bundle.js never fires (the event already occurred by the time these
    // scripts are injected), preventing the real init() from running.
    function loadAppScript() {
      const script = document.createElement('script');
      script.src = '/web/app.js';
      script.onload = async () => {
        log('app.js loaded');
      try {
        // Call restoreBackendState which should populate window.achievementEdits and window._savedDecisions
        if (typeof restoreBackendState === 'function'){
          const hadServer = await restoreBackendState();
          log('restoreBackendState returned: ' + hadServer);
        } else {
          log('restoreBackendState not found');
        }

        // Validate achievement edits restored
        // achievementEdits entries are {text, hidden} objects since the
        // hide-bullets feature was added; check .text not the raw item
        if (window.achievementEdits && Array.isArray(window.achievementEdits[0]) && window.achievementEdits[0][0].text.startsWith('Edited')){
          log('PASS: achievementEdits restored');
        } else {
          log('FAIL: achievementEdits not restored');
        }

        // Validate saved decisions
        if (window._savedDecisions && window._savedDecisions.extra_skills && window._savedDecisions.extra_skills.includes('Go')){
          log('PASS: saved decisions (extra_skills) restored');
        } else {
          log('FAIL: saved decisions not restored');
        }

        // Build summary focus section which fetches master+status in parallel
        if (typeof buildSummaryFocusSection === 'function'){
          await buildSummaryFocusSection();
          // The summary panel should have session summary applied; we inspect the DOM element
          const aiTextEl = document.getElementById('ai-summary-text');
          const aiText = aiTextEl ? aiTextEl.value : '';
          if (aiText && aiText.includes('Session AI')){
            log('PASS: buildSummaryFocusSection used session summary');
          } else {
            log('FAIL: buildSummaryFocusSection did not use session summary');
          }
        } else {
          log('buildSummaryFocusSection not found');
        }

      } catch (e){
        log('ERROR: ' + e.message);
      }
      };
      script.onerror = () => log('Failed to load app.js — ensure this file is served from the web root as /web/app.js');
      document.head.appendChild(script);
    }

    const bundleScript = document.createElement('script');
    bundleScript.src = '/web/bundle.js';
    bundleScript.onload = () => {
      log('bundle.js loaded');
      loadAppScript();
    };
    bundleScript.onerror = () => log('Failed to load bundle.js — ensure this file is served from the web root as /web/bundle.js');
    document.head.appendChild(bundleScript);
  </script>
</body>
</html>
