# CV Builder Configuration
# This file contains paths and default settings for the CV generation system

# Data File Locations
# These can be absolute paths or relative to your home directory (~)
data:
  master_cv: "~/CV/Master_CV_Data.json"
  publications: "~/CV/publications.bib"
  output_dir: "~/CV/cv-builder"

# LLM Provider Settings
llm:
  default_provider: "gemini"  # Options: copilot-oauth, copilot, github, openai, anthropic, gemini, groq, local
  default_model: "gemini-flash-latest"  # Model name; null uses provider default
  temperature: 0.7
  max_tokens: null  # null uses provider default
  request_timeout_seconds: 300  # Max seconds to wait for a single LLM reply (null = no limit)

# CV Generation Defaults
generation:
  base_font_size: "13px"
  max_skills: 20
  max_achievements: 5
  max_publications: 10
  page_margin: "0.5in"

  # CV Length Constraints
  page_count:
    warn_single: true       # Warn if output is 1 page
    ideal_min: 2            # Ideal minimum pages
    ideal_max: 3            # Ideal maximum pages (warn if exceeded)
    absolute_max: 4         # Absolute maximum (fail if exceeded)

  # Output formats to generate
  formats:
    ats_docx: true       # ATS-optimized DOCX (machine-parseable)
    human_pdf: true      # Human-readable PDF (styled)
    human_docx: true     # Human-readable DOCX (styled)

# Session Management
session:
  auto_save: true
  session_dir: "~/CV/cv-builder/sessions"  # Sessions saved in CV directory
  history_file: "~/CV/cv-builder/input_history"

# Web UI Settings
web:
  host: "127.0.0.1"
  port: 5001
  debug: false

# Logging
logging:
  level: "DEBUG"                   # Options: DEBUG, INFO, WARNING, ERROR
  file: "cv-builder.log"           # null logs to console only
  log_dir: "~/CV/cv-builder/logs"  # Directory for log files
