data:
  master_cv: ~/CV/Master_CV_Data.json
  publications: ~/CV/publications.bib
  output_dir: ~/CV/cv-builder
llm:
  default_provider: copilot-sdk
  default_model: gpt-5-mini
  temperature: 0.7
  max_tokens: null
  request_timeout_seconds: 300
generation:
  base_font_size: 13px
  max_skills: 20
  max_achievements: 5
  max_publications: 10
  page_margin: 0.5in
  page_count:
    warn_single: true
    ideal_min: 2
    ideal_max: 3
    absolute_max: 4
  formats:
    ats_docx: true
    human_pdf: true
    human_docx: true
  skills_section_title: Skills
session:
  auto_save: true
  session_dir: ~/CV/cv-builder/sessions
  history_file: ~/CV/cv-builder/input_history
web:
  host: 127.0.0.1
  port: 5001
  debug: false
logging:
  level: DEBUG
  file: cv-builder.log
  log_dir: ~/CV/cv-builder/logs
