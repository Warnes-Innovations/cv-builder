name: PR - Unit Tests and HTML Harness

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest

      - name: Run Python unit tests
        run: python -m pytest -q tests/unit tests/test_scoring.py tests/test_template_renderer.py tests/test_cv_orchestrator.py tests/test_copilot_auth.py tests/test_bibtex_parser.py

  js-tests:
    name: JavaScript unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run JS unit tests
        run: npm run test:js

  integration-harness:
    name: Run HTML integration harness
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run integration HTML harness
        env:
          CI: true
        run: npm run test:integration:headless
